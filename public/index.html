<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Music Ability</title>
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <main class="shell hero">
      <section class="hero-copy">
        <p class="eyebrow">Music Taste Profile</p>
        <h1>음악력은 취향의 넓이와 깊이를 같이 보는 지도.</h1>
        <p class="lead">연결한 음악 서비스의 청취 데이터를 바탕으로 장르의 폭, 감상 깊이, 새로운 음악을 발견하는 성향을 분석해 보여줍니다.</p>
        <div class="actions">
          <a class="button primary" href="/login">Spotify로 시작</a>
          <a class="button secondary" href="/dashboard.html?demo=1">데모 보기</a>
        </div>
        <p class="privacy">음악력 점수는 음악 실력의 순위가 아니라 개인의 음악 탐색 성향을 보여주는 지표입니다.</p>
      </section>
      <section class="signal-board" aria-label="preview">
        <div class="score-orbit">
          <span>84</span>
          <small>music ability</small>
        </div>
        <div class="preview-list">
          <div><strong>K-pop / Korean</strong><span>36%</span></div>
          <div><strong>J-pop / Japanese</strong><span>22%</span></div>
          <div><strong>Indie / Alternative</strong><span>18%</span></div>
          <div><strong>Hip-hop / Rap</strong><span>12%</span></div>
        </div>
      </section>
    </main>
    <script type="module" src="/js/home.js"></script>
  </body>
</html>
