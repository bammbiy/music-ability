<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Music Ability Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <main class="shell dashboard">
      <header class="topbar">
        <div>
          <p class="eyebrow">Music Ability</p>
          <h1>내 음악 취향 분석</h1>
        </div>
        <a class="button secondary" href="/">처음으로</a>
      </header>

      <section class="result-grid">
        <article class="panel score-panel">
          <span class="label">음악력 점수</span>
          <strong id="score">--</strong>
          <p id="summary">분석을 준비하는 중입니다.</p>
        </article>

        <article class="panel metrics-panel">
          <span class="label">취향 지표</span>
          <div id="metrics" class="metrics"></div>
        </article>

        <article class="panel wide">
          <span class="label">장르 스펙트럼</span>
          <div id="buckets" class="bars"></div>
        </article>

        <article class="panel wide">
          <span class="label">세부 장르</span>
          <div id="genres" class="chips"></div>
        </article>

        <article class="panel">
          <span class="label">상위 트랙</span>
          <div id="tracks" class="rank-list"></div>
        </article>

        <article class="panel">
          <span class="label">취향이 겹치는 큐레이터</span>
          <div id="critics" class="rank-list"></div>
        </article>

        <article class="panel wide feedback-panel">
          <span class="label">분석 품질 개선</span>
          <p>분석 결과와 평가를 익명화해 음악력 계산을 개선하는 데 사용할 수 있어. 참여 여부는 언제든 바꿀 수 있어.</p>
          <div class="feedback-actions">
            <button class="button primary" id="consent-button" type="button">품질 개선에 참여</button>
            <form id="feedback-form" class="feedback-form">
              <label for="rating">이번 분석은 얼마나 잘 맞나요?</label>
              <select id="rating" name="rating">
                <option value="5">5점 · 매우 잘 맞음</option>
                <option value="4">4점 · 잘 맞음</option>
                <option value="3">3점 · 보통</option>
                <option value="2">2점 · 조금 다름</option>
                <option value="1">1점 · 전혀 다름</option>
              </select>
              <button class="button secondary" type="submit">평가 보내기</button>
            </form>
          </div>
          <small id="feedback-status" class="feedback-status" role="status"></small>
        </article>

        <article class="panel wide media-panel">
          <span class="label">음악 정보 피드</span>
          <div class="media-search">
            <label class="sr-only" for="media-query">정보 검색</label>
            <input id="media-query" type="search" value="new music" placeholder="아티스트나 곡 검색">
            <button class="button secondary" id="media-search-button" type="button">검색</button>
          </div>
          <div id="media-items" class="media-list"></div>
        </article>
      </section>
    </main>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
